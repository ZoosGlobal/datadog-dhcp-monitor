name: Update README Date

on:
  push:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update date
        run: |
          DATE=$(TZ='Asia/Kolkata' date +"%B %d, %Y")
          sed -i "s/<!--LAST_UPDATED-->/$DATE/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update README date" || echo "No changes"
          git push